<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grifado — Gerador de Orçamentos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --amarelo: #F5C800;
      --cinza: #595A59;
      --preto: #1A1A1A;
      --branco: #FFFFFF;
      --cinza-claro: #F2F2F2;
      --cinza-medio: #E0E0E0;
      --sucesso: #2ECC71;
      --erro: #E74C3C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cinza);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .logo-box {
      background: var(--amarelo);
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-box span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--cinza);
      letter-spacing: 2px;
    }

    .header-text h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--branco);
      letter-spacing: 3px;
    }

    .header-text p {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card {
      background: var(--branco);
      width: 100%;
      max-width: 680px;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .card-header {
      background: var(--preto);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header .numero {
      background: var(--amarelo);
      color: var(--preto);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .card-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      color: var(--branco);
      letter-spacing: 2px;
    }

    .card-body {
      padding: 20px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .row.full { grid-template-columns: 1fr; }
    .row.triple { grid-template-columns: 1fr 1fr 1fr; }

    .field label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--cinza);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field input, .field textarea, .field select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--cinza-medio);
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--preto);
      background: var(--cinza-claro);
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none;
      border-color: var(--amarelo);
      background: var(--branco);
    }

    .field textarea {
      resize: none;
      height: 70px;
      line-height: 1.5;
    }

    .field input[readonly] {
      background: #FFFBEA;
      border-color: var(--amarelo);
      font-weight: 600;
      color: var(--cinza);
    }

    .subitem-card {
      border: 1.5px solid var(--cinza-medio);
      border-radius: 3px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .subitem-header {
      background: var(--cinza-claro);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .subitem-header span {
      font-size: 11px;
      font-weight: 600;
      color: var(--cinza);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .subitem-body {
      padding: 14px;
    }

    .tag {
      display: inline-block;
      background: var(--amarelo);
      color: var(--preto);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }

    .valores-calc {
      background: var(--preto);
      border-radius: 3px;
      padding: 14px;
      margin-top: 12px;
    }

    .calc-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .calc-row:last-child { border-bottom: none; }

    .calc-row span:first-child {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .calc-row span:last-child {
      font-size: 13px;
      font-weight: 600;
      color: var(--branco);
    }

    .calc-row.total span:first-child {
      color: var(--amarelo);
      font-weight: 700;
    }

    .calc-row.total span:last-child {
      color: var(--amarelo);
      font-size: 16px;
    }

    .btn-gerar {
      width: 100%;
      max-width: 680px;
      background: var(--amarelo);
      color: var(--preto);
      border: none;
      padding: 18px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-gerar:hover { background: #e0b500; transform: translateY(-1px); }
    .btn-gerar:active { transform: translateY(0); }
    .btn-gerar:disabled { background: var(--cinza-medio); color: var(--cinza); cursor: not-allowed; transform: none; }

    .status-box {
      width: 100%;
      max-width: 680px;
      margin-top: 16px;
      padding: 16px 20px;
      border-radius: 4px;
      display: none;
      align-items: center;
      gap: 12px;
    }

    .status-box.sucesso { background: #d4edda; border-left: 4px solid var(--sucesso); display: flex; }
    .status-box.erro { background: #f8d7da; border-left: 4px solid var(--erro); display: flex; }
    .status-box.loading { background: #fff8e1; border-left: 4px solid var(--amarelo); display: flex; }

    .status-box p { font-size: 14px; font-weight: 500; }
    .status-box.sucesso p { color: #155724; }
    .status-box.erro p { color: #721c24; }
    .status-box.loading p { color: #856404; }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: var(--amarelo);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .row.triple { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-box">
    <span>GRIF</span>
    <span>ADO</span>
  </div>
  <div class="header-text">
    <h1>Gerador de Orçamentos</h1>
    <p>Sistema interno Grifado</p>
  </div>
</header>

<!-- DADOS PRINCIPAIS -->
<div class="card">
  <div class="card-header">
    <div class="numero">1</div>
    <h2>Dados do Orçamento</h2>
  </div>
  <div class="card-body">
    <div class="row">
      <div class="field">
        <label>Cliente</label>
        <input type="text" id="cliente" placeholder="Ex: Honda">
      </div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="data">
      </div>
    </div>
    <div class="row full">
      <div class="field">
        <label>Nome do Projeto</label>
        <input type="text" id="nome_projeto" placeholder="Ex: Evento Golf Collection | Ribeirão Preto">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Nº Orçamento</label>
        <input type="text" id="num_orcamento" placeholder="Ex: 2025486">
      </div>
      <div class="field">
        <label>Orçamento Número</label>
        <input type="text" id="orcamento_numero" readonly placeholder="Gerado automaticamente">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Fornecedor</label>
        <select id="fornecedor">
          <option value="Grifado">Grifado</option>
        </select>
      </div>
      <div class="field">
        <label>Tipo de Serviço</label>
        <select id="tipo_servico">
          <option value="Serviços">Serviços</option>
          <option value="Produtos">Produtos</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- SUBITEM -->
<div class="card">
  <div class="card-header">
    <div class="numero">2</div>
    <h2>Item do Orçamento</h2>
  </div>
  <div class="card-body">
    <div class="subitem-card">
      <div class="subitem-header">
        <span>Subitem 1</span>
        <span class="tag">Principal</span>
      </div>
      <div class="subitem-body">
        <div class="row full" style="margin-bottom:10px">
          <div class="field">
            <label>Nome do Subitem</label>
            <input type="text" id="subitem_nome" placeholder="Ex: Evento Golf Collection | Ribeirão Preto | 12 e 13.06">
          </div>
        </div>
        <div class="row full" style="margin-bottom:10px">
          <div class="field">
            <label>Descritivo</label>
            <textarea id="descritivo" placeholder="Descrição do serviço..."></textarea>
          </div>
        </div>
        <div class="row triple">
          <div class="field">
            <label>Valor Compra (R$)</label>
            <input type="number" id="valor_compra" placeholder="0" oninput="calcular()">
          </div>
          <div class="field">
            <label>Quantidade</label>
            <input type="number" id="quantidade" value="1" oninput="calcular()">
          </div>
          <div class="field">
            <label>Margem (%)</label>
            <input type="number" id="margem" value="38" oninput="calcular()">
          </div>
        </div>

        <div class="valores-calc">
          <div class="calc-row">
            <span>Valor Compra</span>
            <span id="calc_compra">R$ 0,00</span>
          </div>
          <div class="calc-row">
            <span>Valor Venda (c/ margem)</span>
            <span id="calc_venda">R$ 0,00</span>
          </div>
          <div class="calc-row">
            <span>Fee Grifado (10%)</span>
            <span id="calc_fee">R$ 0,00</span>
          </div>
          <div class="calc-row total">
            <span>Total ao Cliente</span>
            <span id="calc_total">R$ 0,00</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="btn-gerar" onclick="gerarOrcamento()">⚡ GERAR ORÇAMENTO NO MONDAY</button>

<div class="status-box" id="status">
  <div class="spinner" id="spinner" style="display:none"></div>
  <p id="status-msg"></p>
</div>

<script>
  // Preenche data de hoje
  const hoje = new Date().toISOString().split('T')[0];
  document.getElementById('data').value = hoje;

  // Auto-preenche Orçamento Número
  document.getElementById('num_orcamento').addEventListener('input', function() {
    document.getElementById('orcamento_numero').value = this.value ? this.value + 'R1' : '';
  });

  function fmt(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function calcular() {
    const compra = parseFloat(document.getElementById('valor_compra').value) || 0;
    const qtd = parseFloat(document.getElementById('quantidade').value) || 1;
    const margem = parseFloat(document.getElementById('margem').value) || 38;
    const fee = 10;

    const totalCompra = compra * qtd;
    const venda = totalCompra / (1 - margem / 100);
    const feeValor = venda * (fee / 100);
    const total = venda + feeValor;

    document.getElementById('calc_compra').textContent = fmt(totalCompra);
    document.getElementById('calc_venda').textContent = fmt(venda);
    document.getElementById('calc_fee').textContent = fmt(feeValor);
    document.getElementById('calc_total').textContent = fmt(total);
  }

  function setStatus(tipo, msg) {
    const box = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    box.className = 'status-box ' + tipo;
    document.getElementById('status-msg').textContent = msg;
    spinner.style.display = tipo === 'loading' ? 'block' : 'none';
  }

  async function gerarOrcamento() {
    const campos = ['cliente', 'nome_projeto', 'num_orcamento', 'subitem_nome', 'descritivo', 'valor_compra'];
    for (const c of campos) {
      if (!document.getElementById(c).value.trim()) {
        setStatus('erro', `Campo obrigatório não preenchido: ${c.replace('_', ' ')}`);
        return;
      }
    }

    const payload = {
      nome_projeto: document.getElementById('nome_projeto').value.trim(),
      cliente: document.getElementById('cliente').value.trim(),
      num_orcamento: document.getElementById('num_orcamento').value.trim(),
      orcamento_numero: document.getElementById('orcamento_numero').value.trim(),
      data: document.getElementById('data').value,
      subitem_nome: document.getElementById('subitem_nome').value.trim(),
      fornecedor: document.getElementById('fornecedor').value,
      tipo_servico: document.getElementById('tipo_servico').value,
      descritivo: document.getElementById('descritivo').value.trim(),
      valor_compra: parseFloat(document.getElementById('valor_compra').value),
      quantidade: parseFloat(document.getElementById('quantidade').value) || 1,
      margem: parseFloat(document.getElementById('margem').value) || 38,
      fee: 10
    };

    const btn = document.querySelector('.btn-gerar');
    btn.disabled = true;
    setStatus('loading', 'Enviando para o Monday...');

    try {
      const res = await fetch('https://hook.us2.make.com/jpmm9qdrgwj62rqil24h06uybm3r0l3x', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        setStatus('sucesso', `✅ Orçamento ${payload.orcamento_numero} criado com sucesso no Monday!`);
      } else {
        setStatus('erro', 'Erro ao enviar. Tente novamente.');
      }
    } catch (e) {
      setStatus('erro', 'Erro de conexão. Verifique sua internet.');
    }

    btn.disabled = false;
  }
</script>
</body>
</html>
